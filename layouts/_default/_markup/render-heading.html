{{- $isPost := or (eq .Page.Section "posts") (eq .Page.Type "posts") -}}
{{- if and (eq .Level 2) $isPost -}}
<hr>
{{- end -}}
<h{{ .Level }}{{ if .Anchor }} id="{{ .Anchor }}"{{ end }}>
  {{- if and $isPost .Anchor -}}
  <a href="#{{ .Anchor }}" class="anchor-link"><span class="anchor-symbol" aria-hidden="true">¶</span>{{ .Text | safeHTML }}</a>
  {{- else -}}
  {{ .Text | safeHTML }}
  {{- end -}}
</h{{ .Level }}>
